<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tunnel Cloudflared Desktop</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <script type="module" src="/src/main.js" defer></script>
</head>

<body class="bg-devops-dark text-slate-200 antialiased overflow-hidden">
  <div id="app" class="flex h-screen w-screen border-t border-devops-border">
    <!-- Sidebar -->
    <aside class="w-64 bg-devops-card flex-shrink-0 border-r border-devops-border flex flex-col">
      <div class="p-6">
        <h1 class="text-xl font-bold text-white flex items-center gap-2">
          <span class="w-8 h-8 bg-devops-accent rounded-lg flex items-center justify-center text-sm">TC</span>
          Cloudflared
        </h1>
      </div>

      <nav class="flex-1 px-4 space-y-2 py-4">
        <a href="#" class="nav-link" data-view="dashboard">
          Dashboard
        </a>
        <a href="#" class="nav-link" data-view="quick_tunnels">
          Quick Tunnels
        </a>
        <a href="#" class="nav-link" data-view="accounts">
          Cloudflare Accounts
        </a>
        <a href="#" class="nav-link" data-view="tunnels">
          Tunnel Connector
        </a>
        <a href="#" class="nav-link" data-view="logs">
          Real-time Logs
        </a>
        <a href="#" class="nav-link" data-view="settings">
          Settings
        </a>
      </nav>

      <div class="p-4 border-t border-devops-border">
        <div class="flex items-center gap-3 px-2 py-3">
          <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center">
            <span class="text-xs">USR</span>
          </div>
          <div class="overflow-hidden flex-1">
            <p class="text-xs font-semibold text-white truncate">Administrator</p>
            <p class="text-[10px] text-slate-400">Tunnel Architect</p>
          </div>
          <div class="text-[10px] font-bold text-devops-accent bg-devops-accent/10 px-1.5 py-0.5 rounded">v1.2.0</div>
        </div>

        <!-- Social Links -->
        <div class="flex items-center justify-center gap-4 mt-2 pt-2 border-t border-devops-border/30">
          <a href="https://github.com/maskodingku/Tunnel-Cloudflared-Desktop" target="_blank"
            class="text-slate-400 hover:text-white transition-colors" title="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4">
              </path>
              <path d="M9 18c-4.51 2-5-2-7-2"></path>
            </svg>
          </a>
          <a href="https://www.facebook.com/maskodingku/" target="_blank"
            class="text-slate-400 hover:text-white transition-colors" title="Facebook">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
            </svg>
          </a>
          <a href="https://www.maskoding.com/" target="_blank" class="text-slate-400 hover:text-white transition-colors"
            title="Website">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
              </path>
            </svg>
          </a>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <header
        class="h-16 border-b border-devops-border flex items-center justify-between px-8 bg-devops-dark/50 backdrop-blur-sm">
        <h2 id="view-title" class="text-lg font-semibold text-white">Dashboard</h2>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2 px-3 py-1 bg-green-500/10 border border-green-500/20 rounded-full">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] text-green-500 font-medium">BINARY ACTIVE</span>
          </div>
        </div>
      </header>

      <section id="content" class="flex-1 overflow-y-auto p-8">
        <!-- Content injected here via main.js -->
      </section>
    </main>
  </div>
</body>

</html>
